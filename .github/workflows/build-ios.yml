name: Build iOS .ipa (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    name: 🍎 Build Unsigned .ipa
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ──────────────────────────────────────
      # 1. Checkout source code
      # ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────
      # 2. Setup Node.js
      # ──────────────────────────────────────
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ──────────────────────────────────────
      # 3. Install JS dependencies
      # ──────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ──────────────────────────────────────
      # 4. Expo Prebuild — generate native iOS project
      # ──────────────────────────────────────
      - name: 🔧 Expo Prebuild (generate iOS project)
        run: npx expo prebuild --platform ios --clean --no-install

      # ──────────────────────────────────────
      # 5. Install CocoaPods
      # ──────────────────────────────────────
      - name: 🔧 Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      # ──────────────────────────────────────
      # 6. Build with xcodebuild (NO code signing)
      # ──────────────────────────────────────
      - name: 🏗️ Build .app with xcodebuild
        working-directory: ios
        run: |
          # Find the workspace name
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          echo "🔍 Found workspace: $WORKSPACE"

          # Extract scheme name (same as workspace name without extension)
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "🔍 Using scheme: $SCHEME"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | tail -50

      # ──────────────────────────────────────
      # 7. Package .app into .ipa
      # ──────────────────────────────────────
      - name: 📦 Package .ipa
        working-directory: ios
        run: |
          # Find the .app bundle
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ ERROR: .app not found!"
            echo "📂 Contents of build directory:"
            find build -type d -maxdepth 5
            exit 1
          fi

          echo "✅ Found .app at: $APP_PATH"

          # Create Payload structure and package .ipa
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r -9 app.ipa Payload

          echo "✅ app.ipa created successfully!"
          ls -lh app.ipa

      # ──────────────────────────────────────
      # 8. Upload .ipa as GitHub Artifact
      # ──────────────────────────────────────
      - name: 📤 Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitnessAtHome-iOS
          path: ios/app.ipa
          retention-days: 30
